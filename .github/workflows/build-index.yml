name: Build Registry Indexes
on:
  push:
    branches:
      - main
    paths:
      - "packages/**"
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build static indexes
        run: python3 scripts/build_indexes.py --registry-root "$PWD"

      - name: Commit index updates
        run: |
          if git diff --quiet -- index; then
            echo "No index updates."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index
          git commit -m "build: refresh registry indexes"
          git push
