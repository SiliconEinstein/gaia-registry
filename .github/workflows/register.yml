name: Validate Registration
on:
  pull_request:
    paths:
      - "packages/**"

jobs:
  sandbox-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.parse.outputs.package_name }}
      package_uuid: ${{ steps.parse.outputs.package_uuid }}
      git_sha: ${{ steps.validate.outputs.git_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python + venv with Gaia CLI
        run: |
          uv python install 3.12
          uv venv .venv --python 3.12
          source .venv/bin/activate
          uv pip install gaia-lang
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Parse registration payload
        id: parse
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          PKG_DIR=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- packages/ | awk -F/ '/^packages\/[^/]+\// {print $1 "/" $2; exit}')
          if [ -z "$PKG_DIR" ]; then
            echo "No changed package metadata found under packages/" >&2
            exit 1
          fi
          echo "pkg_dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
          export PKG_DIR
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import tomllib

          pkg_dir = os.environ["PKG_DIR"]
          with open(f"{pkg_dir}/Package.toml", "rb") as f:
              package = tomllib.load(f)
          with open(f"{pkg_dir}/Versions.toml", "rb") as f:
              versions = tomllib.load(f)["versions"]
          version = next(reversed(versions))
          payload = versions[version]

          print(f"package_name={package['name']}")
          print(f"package_uuid={package['uuid']}")
          print(f"repo_url={package['repo']}")
          print(f"version={version}")
          print(f"git_tag={payload['git_tag']}")
          print(f"git_sha={payload.get('git_sha', '')}")
          print(f"ir_hash={payload['ir_hash']}")
          PY

      - name: Clone and validate source release
        id: validate
        run: |
          git clone "${{ steps.parse.outputs.repo_url }}" pkg
          cd pkg
          if [ -n "${{ steps.parse.outputs.git_sha }}" ] && [ "${{ steps.parse.outputs.git_sha }}" != "None" ]; then
            git checkout "${{ steps.parse.outputs.git_sha }}"
          else
            git checkout "${{ steps.parse.outputs.git_tag }}"
          fi
          ACTUAL_SHA=$(git rev-parse HEAD)
          echo "git_sha=$ACTUAL_SHA" >> "$GITHUB_OUTPUT"

          if [ -n "${{ steps.parse.outputs.git_sha }}" ] && [ "${{ steps.parse.outputs.git_sha }}" != "None" ] && [ "$ACTUAL_SHA" != "${{ steps.parse.outputs.git_sha }}" ]; then
            echo "Pinned SHA mismatch: expected ${{ steps.parse.outputs.git_sha }}, got $ACTUAL_SHA" >&2
            exit 1
          fi

          uv pip install -e .

          gaia compile .
          ACTUAL_HASH=$(cat .gaia/ir_hash)
          if [ "$ACTUAL_HASH" != "${{ steps.parse.outputs.ir_hash }}" ]; then
            echo "IR hash mismatch: expected ${{ steps.parse.outputs.ir_hash }}, got $ACTUAL_HASH" >&2
            exit 1
          fi

          gaia check .

          python3 - <<'PY'
          import pathlib
          import tomllib

          pkg_dependencies = tomllib.loads(pathlib.Path("pyproject.toml").read_text()).get("project", {}).get("dependencies", [])
          gaia_deps = []
          for dep in pkg_dependencies:
              requirement = dep.split(";", 1)[0].strip()
              name = requirement.split(" ", 1)[0].split("[", 1)[0]
              name = name.split("<", 1)[0].split(">", 1)[0].split("=", 1)[0].split("!", 1)[0].split("~", 1)[0]
              if name.endswith("-gaia"):
                  gaia_deps.append(name.removesuffix("-gaia"))

          missing = [name for name in gaia_deps if not pathlib.Path("../packages", name).exists()]
          if missing:
              raise SystemExit(f"Unregistered Gaia dependencies: {', '.join(sorted(missing))}")
          print("Registered Gaia dependencies:", ", ".join(sorted(gaia_deps)) if gaia_deps else "(none)")
          PY

      - name: Validate namespace
        working-directory: pkg
        run: |
          python3 -c "
          import json, sys
          graph = json.load(open('.gaia/ir.json'))
          ns = graph.get('namespace', '')
          if ns != 'github':
              print(f'Error: namespace must be \"github\", got \"{ns}\"', file=sys.stderr)
              sys.exit(1)
          print(f'Namespace OK: {ns}')
          "

  trusted-gate:
    needs: sandbox-validate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify UUID uniqueness
        run: |
          PACKAGE_NAME="${{ needs.sandbox-validate.outputs.package_name }}"
          PACKAGE_UUID="${{ needs.sandbox-validate.outputs.package_uuid }}"
          python3 - <<'PY'
          import os
          import pathlib
          import tomllib

          package_name = os.environ["PACKAGE_NAME"]
          package_uuid = os.environ["PACKAGE_UUID"]

          for package_toml in pathlib.Path("packages").glob("*/Package.toml"):
              payload = tomllib.loads(package_toml.read_text())
              if payload["name"] == package_name:
                  continue
              if payload["uuid"] == package_uuid:
                  raise SystemExit(f"UUID collision: {package_uuid} already used by {payload['name']}")
          print(f"UUID OK: {package_uuid}")
          PY
        env:
          PACKAGE_NAME: ${{ needs.sandbox-validate.outputs.package_name }}
          PACKAGE_UUID: ${{ needs.sandbox-validate.outputs.package_uuid }}

      - name: Validation summary
        run: |
          echo "Pinned commit SHA: ${{ needs.sandbox-validate.outputs.git_sha }}"
