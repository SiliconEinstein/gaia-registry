name: Validate Registration
on:
  pull_request:
    paths: ['packages/**']

jobs:
  # ── Job 1: Untrusted sandbox (NO write permissions) ──
  sandbox-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history needed for git diff

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.12

      - name: Parse registration PR
        id: parse
        run: |
          # Find package directories with Package.toml
          PKG_DIR=$(find packages -name "Package.toml" -exec dirname {} \; | head -1)
          echo "pkg_dir=$PKG_DIR" >> "$GITHUB_OUTPUT"

          # Read metadata
          REPO_URL=$(python3 -c "
          import tomllib
          t = tomllib.loads(open('${PKG_DIR}/Package.toml').read())
          print(t['repo'])
          ")
          echo "repo_url=$REPO_URL" >> "$GITHUB_OUTPUT"

          VERSION=$(python3 -c "
          import tomllib
          t = tomllib.loads(open('${PKG_DIR}/Versions.toml').read())
          versions = list(t.get('versions', {}).keys())
          print(versions[-1] if versions else '')
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          GIT_TAG=$(python3 -c "
          import tomllib
          t = tomllib.loads(open('${PKG_DIR}/Versions.toml').read())
          v = list(t.get('versions', {}).values())[-1]
          print(v.get('git_tag', ''))
          ")
          echo "git_tag=$GIT_TAG" >> "$GITHUB_OUTPUT"

          GIT_SHA=$(python3 -c "
          import tomllib
          t = tomllib.loads(open('${PKG_DIR}/Versions.toml').read())
          v = list(t.get('versions', {}).values())[-1]
          print(v.get('git_sha', ''))
          ")
          echo "git_sha=$GIT_SHA" >> "$GITHUB_OUTPUT"

          IR_HASH=$(python3 -c "
          import tomllib
          t = tomllib.loads(open('${PKG_DIR}/Versions.toml').read())
          v = list(t.get('versions', {}).values())[-1]
          print(v.get('ir_hash', ''))
          ")
          echo "ir_hash=$IR_HASH" >> "$GITHUB_OUTPUT"

      - name: Clone and pin to commit SHA
        id: pin
        run: |
          git clone ${{ steps.parse.outputs.repo_url }} pkg
          cd pkg
          if [ -n "${{ steps.parse.outputs.git_sha }}" ]; then
            git checkout ${{ steps.parse.outputs.git_sha }}
          else
            git checkout ${{ steps.parse.outputs.git_tag }}
          fi
          echo "git_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install gaia-lang
        run: |
          cd pkg
          uv sync 2>/dev/null || uv pip install gaia-lang 2>/dev/null || echo "No gaia-lang dep yet, using local"

      - name: Reproducible build (executes author code — sandboxed, read-only)
        run: |
          cd pkg
          # For now, verify the package can be imported and ir.json exists
          if [ -f ".gaia/ir_hash" ] && [ -n "${{ steps.parse.outputs.ir_hash }}" ]; then
            ACTUAL=$(cat .gaia/ir_hash)
            EXPECTED="${{ steps.parse.outputs.ir_hash }}"
            if [ "$ACTUAL" != "$EXPECTED" ]; then
              echo "ERROR: ir_hash mismatch! Expected $EXPECTED, got $ACTUAL"
              exit 1
            fi
            echo "ir_hash verified: $ACTUAL"
          else
            echo "Skipping ir_hash verification (not provided or no .gaia/ir_hash)"
          fi

      - name: Schema validation
        run: |
          if [ -f "pkg/.gaia/ir.json" ]; then
            python3 -c "
          import json
          ir = json.load(open('pkg/.gaia/ir.json'))
          assert 'package' in ir, 'Missing package field'
          assert 'knowledge' in ir, 'Missing knowledge field'
          assert 'strategies' in ir, 'Missing strategies field'
          assert 'operators' in ir, 'Missing operators field'
          print(f'Schema OK: {len(ir[\"knowledge\"])} knowledge, {len(ir[\"strategies\"])} strategies')
          "
          else
            echo "No ir.json found, skipping schema validation"
          fi

    outputs:
      git_sha: ${{ steps.pin.outputs.git_sha }}

  # ── Job 2: Trusted gate (label/merge permissions, NO code execution) ──
  trusted-gate:
    needs: sandbox-validate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Validation passed
        run: |
          echo "Sandbox validation passed"
          echo "Pinned commit SHA: ${{ needs.sandbox-validate.outputs.git_sha }}"
